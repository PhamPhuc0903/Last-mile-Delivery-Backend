version: "3"

services:

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - order-service
      - driver-service
      - tracking-service
      - payment-service
      - notification-service
      - ai-service

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "3003:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  tracking-service:
    build: ./tracking-service
    container_name: tracking-service
    ports:
      - "3004:3000"
    depends_on:
      - redis

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3005:3000"
    depends_on:
      - postgres

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3006:3000"
    depends_on:
      - rabbitmq

  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "3007:3000"

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
      POSTGRES_DB: delivery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data: