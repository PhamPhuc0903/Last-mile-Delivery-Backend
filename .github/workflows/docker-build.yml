name: Build Docker Images

on:
  push:
    branches:
      - develop

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed services
        id: changed
        run: |
          services=()
          for dir in api-gateway auth-service driver-service order-service tracking-service payment-service notification-service ai-service
          do
            if git diff --name-only HEAD~1 HEAD | grep "^$dir/" > /dev/null; then
              services+=("$dir")
            fi
          done
          json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s .)
          echo "services=$json" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t delivery/${{ matrix.service }} ./${{ matrix.service }}


