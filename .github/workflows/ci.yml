name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  CI:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - driver-service
          - order-service
          - tracking-service
          - payment-service
          - notification-service
          - ai-service

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package.json

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run ESLint
        run: |
          cd ${{ matrix.service }}
          npm run lint --if-present || true

      - name: Run Tests
        run: |
          cd ${{ matrix.service }}
          npm test