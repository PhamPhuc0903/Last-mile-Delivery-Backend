name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  CI:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - driver-service
          - order-service
          - tracking-service
          - payment-service
          - notification-service
          - ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package.json
      - run: cd ${{ matrix.service }} && npm ci
      - run: cd ${{ matrix.service }} && npm run lint --if-present || true
      - run: cd ${{ matrix.service }} && npm test

  Build-Docker-Images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - driver-service
          - order-service
          - tracking-service
          - payment-service
          - notification-service
          - ai-service
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t delivery/${{ matrix.service }} ./${{ matrix.service }}

  all-checks:
    name: All Checks Passed
    needs: [CI, Build-Docker-Images]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.CI.result }}" != "success" ] || [ "${{ needs.Build-Docker-Images.result }}" != "success" ]; then
            echo "Some checks failed"
            exit 1
          fi
          echo "All checks passed"